name: Deploy Frontend to GitHub Pages

on:
    push:
        branches:
            - main
        paths:
            - "mobile/**"
            - "package.json"
            - "package-lock.json"
            - ".github/workflows/deploy-frontend-gh-pages.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build Expo web bundle
              env:
                  EXPO_PUBLIC_GRAPHQL_URL: ${{ secrets.EXPO_PUBLIC_GRAPHQL_URL }}
              run: |
                  if [ -z "${EXPO_PUBLIC_GRAPHQL_URL}" ]; then
                    echo "Missing required repository variable: EXPO_PUBLIC_GRAPHQL_URL"
                    echo "Set it to your Render backend GraphQL URL, e.g. https://your-backend.onrender.com/graphql"
                    exit 1
                  fi

                  npm run build:web

            - name: Make Expo asset paths GitHub Pages safe
              run: |
                  node -e "const fs=require('fs');const p='mobile/dist/index.html';let c=fs.readFileSync(p,'utf8');c=c.replace(/([=\"'])\/_expo\//g,'$1./_expo/');fs.writeFileSync(p,c);"

            - name: Add SPA fallback
              run: cp mobile/dist/index.html mobile/dist/404.html

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: mobile/dist

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
