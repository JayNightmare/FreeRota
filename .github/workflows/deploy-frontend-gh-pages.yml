name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-frontend-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_GRAPHQL_URL: https://freerota.onrender.com/graphql
      FRONTEND_DOMAIN: rota.nexusgit.info
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web bundle
        run: npm run build:web

      - name: Add GitHub Pages custom domain file
        run: echo "${FRONTEND_DOMAIN}" > mobile/dist/CNAME

      - name: Add SPA fallback
        run: cp mobile/dist/index.html mobile/dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
